<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Desk Ecosystem Builder</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DeskBuilder">
    <meta name="theme-color" content="#f5efe8">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/scene.css">
    <link rel="stylesheet" href="css/todo.css">
</head>
<body>

    <header class="app-header">
        <h1>Desk Ecosystem Builder</h1>
        <div class="header-controls">
            <button class="sound-toggle" id="sound-toggle" aria-label="Toggle sound"></button>
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode"></button>
        </div>
    </header>

    <div class="unlock-toast" id="unlock-toast">
        <div class="toast-label">New Unlock!</div>
        <div class="toast-name" id="toast-name"></div>
    </div>

    <div class="undo-toast" id="undo-toast">
        <span id="undo-msg">Task completed</span>
        <button id="undo-btn">Undo</button>
    </div>

    <canvas id="particles-canvas"></canvas>

    <div class="install-hint" id="install-hint">
        Tap <strong>Share</strong> then <strong>Add to Home Screen</strong>
        <button class="dismiss-hint" id="dismiss-hint">OK</button>
    </div>

    <div class="scene-card">
        <div class="scene-header">
            <span class="tier-badge" id="tier-badge">Bare Desk</span>
            <span class="xp-display" id="xp-display">0 XP</span>
        </div>
        <div class="desk-scene" id="desk-scene">
            <div class="wall"></div>
            <div class="wall-trim"></div>
            <div class="wall-clock"><div class="clock-hand-h"></div><div class="clock-hand-m"></div><div class="clock-dot"></div></div>
            <div class="wall-frame"></div>
            <div class="wall-shelf">
                <div class="shelf-items">
                    <div class="shelf-book b1"></div><div class="shelf-book b2"></div><div class="shelf-book b3"></div>
                    <div class="shelf-plant-mini"><div class="mini-leaf"></div><div class="mini-pot"></div></div>
                    <div class="shelf-book b4"></div><div class="shelf-book b5"></div>
                </div>
                <div class="shelf-board"><div class="shelf-bracket left"></div><div class="shelf-bracket right"></div></div>
            </div>

            <div class="scene-3d">
                <div class="floor-area"></div>
                <div class="desk">
                    <div class="desk-top"></div>
                    <div class="desk-front"><div class="desk-drawer"><div class="drawer-handle"></div></div><div class="desk-leg left"></div><div class="desk-leg right"></div></div>
                </div>

                <!-- Monitor with dashboard UI -->
                <div class="item monitor-item" id="i-monitor">
                    <div class="monitor-screen">
                        <div class="monitor-display">
                            <div class="screen-ui dashboard">
                                <div class="ui-sidebar"></div>
                                <div class="ui-main">
                                    <div class="ui-text-line w60"></div>
                                    <div class="ui-text-line w40"></div>
                                    <div class="ui-chart-area">
                                        <div class="ui-bar" style="height:60%"></div>
                                        <div class="ui-bar accent" style="height:85%"></div>
                                        <div class="ui-bar" style="height:45%"></div>
                                        <div class="ui-bar accent2" style="height:70%"></div>
                                        <div class="ui-bar" style="height:55%"></div>
                                    </div>
                                    <div class="ui-bottom-row">
                                        <div class="ui-pie"></div>
                                        <div class="ui-stats">
                                            <div class="ui-text-line w80"></div>
                                            <div class="ui-text-line w50"></div>
                                            <div class="ui-text-line w65"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="monitor-chin"></div>
                    <div class="monitor-stand"></div>
                    <div class="monitor-foot"></div>
                </div>

                <!-- RGB (hidden element, triggers mat glow via JS) -->
                <div class="item rgb-strip" id="i-rgb"></div>

                <!-- Speakers -->
                <div class="item speaker left-spk" id="i-speaker-l"><div class="speaker-cone"></div><div class="speaker-pulse"></div></div>
                <div class="item speaker right-spk" id="i-speaker-r"><div class="speaker-cone"></div><div class="speaker-pulse"></div></div>

                <!-- Lamp (hidden, removed from milestones) -->
                <div class="item lamp-item" id="i-lamp"></div>

                <!-- Tablet with chart UI -->
                <div class="item tablet-item" id="i-tablet">
                    <div class="tablet-screen">
                        <div class="screen-ui chart-ui">
                            <div class="chart-grid"></div>
                            <div class="chart-line"></div>
                            <div class="chart-dot d1"></div>
                            <div class="chart-dot d2"></div>
                            <div class="chart-dot d3"></div>
                        </div>
                    </div>
                    <div class="tablet-pencil"></div>
                </div>

                <!-- Laptop on stand with terminal UI -->
                <div class="item laptop-item" id="i-laptop">
                    <div class="laptop-screen">
                        <div class="screen-ui terminal-ui">
                            <div class="term-bar">
                                <span class="term-dot red"></span>
                                <span class="term-dot yellow"></span>
                                <span class="term-dot green"></span>
                            </div>
                            <div class="term-line w70"></div>
                            <div class="term-line w50 dim"></div>
                            <div class="term-line w85"></div>
                            <div class="term-line w40 accent"></div>
                            <div class="term-line w60"></div>
                            <div class="term-cursor"></div>
                        </div>
                    </div>
                    <div class="laptop-base"></div>
                    <div class="laptop-stand"></div>
                </div>

                <!-- Desk mat (RGB glow target) -->
                <div class="item desk-mat" id="i-mat"></div>

                <!-- Keyboard -->
                <div class="item keyboard-item" id="i-keyboard">
                    <div class="key-row"><div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div></div>
                    <div class="key-row"><div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div></div>
                    <div class="key-row"><div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div></div>
                </div>

                <div class="item mouse-item float-1" id="i-mouse"></div>

                <div class="item mug-item" id="i-mug">
                    <div class="mug-steam"><div class="steam-line"></div><div class="steam-line"></div><div class="steam-line"></div></div>
                </div>

                <!-- Headphones -->
                <div class="item headphones-item float-3" id="i-headphones">
                    <div class="hp-band"></div>
                    <div class="hp-cup left"></div>
                    <div class="hp-cup right"></div>
                </div>

                <!-- Potted plant (natural leaves) -->
                <div class="item plant-item" id="i-plant">
                    <div class="plant-leaves">
                        <div class="leaf l1"></div>
                        <div class="leaf l2"></div>
                        <div class="leaf l3"></div>
                        <div class="leaf l4"></div>
                        <div class="leaf l5"></div>
                        <div class="leaf l6"></div>
                    </div>
                    <div class="plant-pot"></div>
                    <div class="plant-center"></div>
                </div>

                <!-- Chair (top-down: round seat + star base casters) -->
                <div class="item chair-item" id="i-chair">
                    <div class="chair-seat"></div>
                    <div class="chair-casters">
                        <div class="caster c1"></div>
                        <div class="caster c2"></div>
                        <div class="caster c3"></div>
                        <div class="caster c4"></div>
                        <div class="caster c5"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="progress-section">
        <div class="progress-header">
            <span id="progress-label">Progress</span>
            <span class="next-unlock" id="next-unlock">Next: Mouse (2 XP)</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
    </div>

    <div class="todo-section">
        <form id="task-form" class="input-box">
            <input type="text" id="task-input" placeholder="Add a task to grow your setup..." autocomplete="off" required>
            <button type="submit">+</button>
        </form>
        <div class="task-count" id="task-count"></div>
        <ul id="task-list" class="task-list"></ul>
        <div id="empty-msg" class="empty-msg" style="display:none;">Your desk awaits. Add tasks to build your dream setup.</div>
    </div>

    <footer class="app-footer">
        <button class="reset-btn" id="reset-btn">Reset Progress</button>
    </footer>

    <script src="js/particles.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/scene.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
