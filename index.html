<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ecosystem Builder</title>
    <style>
        :root {
            --bg: #f4f4f6;
            --surface: #ffffff;
            --text: #1d1d1f;
            --text-muted: #86868b;
            --border: #d2d2d7;
            --accent: #0071e3;
            --desk-wood: #d7a15c;
            --device-silver: #e3e4e5;
            --device-screen: #333333;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --surface: #1d1d1f;
                --text: #f5f5f7;
                --text-muted: #86868b;
                --border: #424245;
                --accent: #2997ff;
                --desk-wood: #8b5a2b;
                --device-silver: #424245;
                --device-screen: #111111;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .workspace-view {
            width: 100%;
            max-width: 500px;
            background: var(--surface);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }

        .status-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 15px;
            font-weight: 500;
        }

        /* Pure CSS Dynamic Canvas Setup */
        .desk-canvas {
            width: 100%;
            height: 180px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            overflow: hidden;
            border-bottom: 4px solid var(--border);
            margin-bottom: 10px;
        }

        .virtual-desk {
            width: 85%;
            height: 12px;
            background-color: var(--desk-wood);
            border-radius: 4px 4px 0 0;
            position: relative;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding: 0 20px;
            transition: all 0.5s ease;
        }

        /* Accessories styling built procedurally */
        .accessory {
            bottom: 12px;
            position: absolute;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(20px) scale(0.8);
        }

        .accessory.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* Mouse item states */
        #item-mouse { left: 75%; width: 14px; height: 8px; background: var(--text-muted); border-radius: 6px 6px 0 0; }
        #item-mouse.pro-tier { background: var(--text); height: 10px; width: 16px; border-radius: 8px 8px 2px 2px; box-shadow: inset 0 2px 0 var(--accent); }

        /* Tablet evolutionary states */
        #item-tablet { left: 15%; width: 30px; height: 42px; background: var(--device-silver); border-radius: 4px; padding: 3px; display: flex; align-items: center; justify-content: center; }
        #item-tablet .screen { width: 100%; height: 100%; background: var(--device-screen); border-radius: 2px; position: relative; }
        
        /* Tablet upgrades visually reflected */
        #item-tablet.air-tier { width: 34px; height: 48px; border-radius: 5px; }
        #item-tablet.pro-tier { width: 40px; height: 54px; border-radius: 6px; box-shadow: 0 0 0 1px var(--accent); }
        #item-tablet.pro-tier .screen::after { content: ''; position: absolute; right: -6px; top: 4px; width: 2px; height: 35px; background: var(--text); border-radius: 1px; } /* Pencil */

        /* Premium Monitor display state */
        #item-monitor { left: calc(50% - 45px); width: 90px; height: 60px; background: transparent; display: flex; flex-direction: column; align-items: center; bottom: 12px; }
        #item-monitor .screen-frame { width: 90px; height: 50px; background: #111; border: 2px solid var(--device-silver); border-radius: 4px; padding: 2px; }
        #item-monitor .screen-display { width: 100%; height: 100%; background: var(--accent); opacity: 0.15; border-radius: 1px; }
        #item-monitor .stand { width: 12px; height: 12px; background: var(--device-silver); }

        /* Todo Container Interface */
        .todo-container {
            width: 100%;
            max-width: 500px;
        }

        .input-box {
            display: flex;
            background: var(--surface);
            border-radius: 12px;
            padding: 6px 12px;
            border: 1px solid var(--border);
            margin-bottom: 15px;
        }

        .input-box input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 0.95rem;
            color: var(--text);
            outline: none;
            padding: 8px 0;
        }

        .input-box button {
            background: transparent;
            border: none;
            color: var(--accent);
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            padding: 0 8px;
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            background: var(--surface);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--border);
            animation: slideUp 0.25s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .task-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .complete-trigger {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .complete-trigger:hover {
            border-color: var(--accent);
        }

        .task-text {
            font-size: 0.95rem;
            word-break: break-word;
        }

        .empty-label {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 30px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <!-- Visual Desk Evolution Canvas -->
    <div class="workspace-view">
        <div class="status-bar">
            <span id="tier-name">Empty Desk Startup</span>
            <span id="score-counter">XP: 0</span>
        </div>
        
        <div class="desk-canvas">
            <div class="virtual-desk">
                <!-- Procedural Canvas Objects -->
                <div id="item-tablet" class="accessory">
                    <div class="screen"></div>
                </div>
                <div id="item-monitor" class="accessory">
                    <div class="screen-frame"><div class="screen-display"></div></div>
                    <div class="stand"></div>
                </div>
                <div id="item-mouse" class="accessory"></div>
            </div>
        </div>
    </div>

    <!-- Minimalist Task Controller -->
    <div class="todo-container">
        <form id="task-form" class="input-box">
            <input type="text" id="task-input" placeholder="Add an item to expand your setup..." autocomplete="off" required>
            <button type="submit">+</button>
        </form>

        <ul id="task-list" class="task-list"></ul>
        <div id="empty-label" class="empty-label" style="display: none;">Desk is clear. Time to draft new targets.</div>
    </div>

    <script>
        const taskForm = document.getElementById('task-form');
        const taskInput = document.getElementById('task-input');
        const taskList = document.getElementById('task-list');
        const emptyLabel = document.getElementById('empty-label');
        
        const scoreCounter = document.getElementById('score-counter');
        const tierName = document.getElementById('tier-name');

        // Dynamic Elements
        const itemMouse = document.getElementById('item-mouse');
        const itemTablet = document.getElementById('item-tablet');
        const itemMonitor = document.getElementById('item-monitor');

        let state = JSON.parse(localStorage.getItem('ecosystem_state')) || {
            xp: 0,
            tasks: []
        };

        function saveState() {
            localStorage.setItem('ecosystem_state', JSON.stringify(state));
        }

        function calculateEvolution() {
            const xp = state.xp;
            scoreCounter.innerText = `XP: ${xp}`;

            // Reset setup modifiers
            itemMouse.className = 'accessory';
            itemTablet.className = 'accessory';
            itemMonitor.className = 'accessory';

            if (xp === 0) {
                tierName.innerText = "Bare Desk Stage";
            } else if (xp < 3) {
                tierName.innerText = "Basics Phase (Standard Mouse)";
                itemMouse.classList.add('visible');
            } else if (xp < 5) {
                tierName.innerText = "Ergonomic Upgrade (Precision Mouse)";
                itemMouse.classList.add('visible', 'pro-tier');
            } else if (xp < 10) {
                tierName.innerText = "Entry Ecosystem (Standard Tablet Added)";
                itemMouse.classList.add('visible', 'pro-tier');
                itemTablet.classList.add('visible');
            } else if (xp < 15) {
                tierName.innerText = "Advanced Ecosystem (Tablet Air)";
                itemMouse.classList.add('visible', 'pro-tier');
                itemTablet.classList.add('visible', 'air-tier');
            } else if (xp < 20) {
                tierName.innerText = "Powerhouse Workspace (Tablet Pro + Pencil)";
                itemMouse.classList.add('visible', 'pro-tier');
                itemTablet.classList.add('visible', 'pro-tier');
            } else {
                tierName.innerText = "Ultimate Ultimate Studio Setup Connected";
                itemMouse.classList.add('visible', 'pro-tier');
                itemTablet.classList.add('visible', 'pro-tier');
                itemMonitor.classList.add('visible');
            }
        }

        function renderTasks() {
            taskList.innerHTML = '';
            if (state.tasks.length === 0) {
                emptyLabel.style.display = 'block';
                return;
            }
            emptyLabel.style.display = 'none';

            state.tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.className = 'task-item';
                li.innerHTML = `
                    <div class="task-left">
                        <div class="complete-trigger" onclick="completeTask(${index})" aria-label="Complete task"></div>
                        <span class="task-text">${escapeHtml(task)}</span>
                    </div>
                `;
                taskList.appendChild(li);
            });
        }

        window.completeTask = function(index) {
            // Remove task, scale XP up
            state.tasks.splice(index, 1);
            state.xp += 1;
            saveState();
            renderTasks();
            calculateEvolution();
        };

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.innerText = text;
            return div.innerHTML;
        }

        taskForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = taskInput.value.trim();
            if (text) {
                state.tasks.push(text);
                saveState();
                renderTasks();
                taskInput.value = '';
            }
        });

        // Initialize App Loop
        renderTasks();
        calculateEvolution();
    </script>
</body>
</html>
